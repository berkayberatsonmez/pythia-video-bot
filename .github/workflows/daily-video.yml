name: Pythia Günlük Video

# 3 zamanlı cron (UTC): 03:41 YouTube yükle (YT 13:00/20:00 TR'ye zamanlı yayınlar),
# 10:07 Instagram sabah Reels, 18:07 Instagram akşam Reels. (TR = UTC+3, DST yok)
on:
  schedule:
    # GitHub cron'u bu repoda ~4-5 saat gecikiyor (garip dakika bile çözmedi).
    # IG için DAKİK zamanlama: cron-job.org → repository_dispatch (aşağıda).
    # Aşağıdaki cron'lar YEDEK — geç de olsa atsınlar; dedup mükerreri engeller.
    - cron: "41 3 * * *" # YouTube (gecikme tolere eder — server-side 13:00/20:00 yayınlar)
    - cron: "7 10 * * *" # IG sabah (yedek)
    - cron: "7 18 * * *" # IG akşam (yedek)
  repository_dispatch: # cron-job.org dış tetiği — DAKİK IG zamanlaması (asıl yol)
    types: [ig-morning, ig-evening]
  workflow_dispatch: # Actions sekmesinden manuel tetikleme
    inputs:
      mode:
        description: "Ne yayınlansın?"
        type: choice
        options:
          - both
          - instagram
          - youtube
          - commenttest
        default: both

permissions:
  contents: write # gh release (IG video hosting) için gerekli

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Chrome bağımlılıkları (Remotion render için)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 fonts-liberation \
            fonts-noto-color-emoji
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Remotion tarayıcısını hazırla
        run: npx remotion browser ensure

      - name: Google kimlik bilgilerini yaz (base64 secrets'tan)
        run: |
          mkdir -p scripts
          echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > scripts/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_B64 }}" | base64 -d > scripts/token.json
          node -e "JSON.parse(require('fs').readFileSync('scripts/credentials.json','utf8')); JSON.parse(require('fs').readFileSync('scripts/token.json','utf8')); console.log('✓ JSON geçerli')"

      - name: Render + yükle (YouTube zamanlı + Instagram Reels)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            echo "▶ Dış tetik (dakik): $ACTION"
            case "$ACTION" in
              ig-morning) npm run rotation -- --instagram --slot morning ;;
              ig-evening) npm run rotation -- --instagram --slot evening ;;
              *)          echo "⚠️ Bilinmeyen dispatch ($ACTION) — atlanıyor" ;;
            esac
          elif [ "$EVENT" = "schedule" ]; then
            SCHED="${{ github.event.schedule }}"
            echo "▶ Zamanlı (GitHub cron, yedek): $SCHED"
            case "$SCHED" in
              "41 3 * * *") npm run rotation -- --upload ;;
              "7 10 * * *") npm run rotation -- --instagram --slot morning ;;
              "7 18 * * *") npm run rotation -- --instagram --slot evening ;;
              *)            echo "⚠️ Bilinmeyen schedule ($SCHED) — atlanıyor" ;;
            esac
          else
            MODE="${{ github.event.inputs.mode }}"
            echo "▶ Manuel: $MODE"
            case "$MODE" in
              instagram)   npm run rotation -- --instagram ;;
              youtube)     npm run rotation -- --upload ;;
              commenttest) npx tsx scripts/upload-instagram.ts --comment-test ;;
              *)           npm run rotation -- --upload --instagram ;;
            esac
          fi
