name: Pythia Günlük Video

# Her gün 05:00 UTC (08:00 TR) — render eder, 13:00 ve 20:00 TR'ye zamanlı yükler.
# YouTube zamanlı yayını sayesinde videolar doğru saatte otomatik public olur.
on:
  schedule:
    # NOT: Tam-saat (:00) cron'ları GitHub'da yoğunlukta saatlerce gecikiyor.
    # "Garip dakika"lara kaydırdık → kuyruk boş, çok daha dakik çalışır.
    - cron: "41 3 * * *" # ~06:41 TR — YouTube (erken + tampon; YT 13:00/20:00 zamanlı yayınlar)
    - cron: "7 10 * * *" # ~13:07 TR — Instagram (sabah videosu, anında)
    - cron: "7 18 * * *" # ~21:07 TR — Instagram (akşam videosu, anında)
  workflow_dispatch: # Actions sekmesinden manuel tetikleme
    inputs:
      mode:
        description: "Ne yayınlansın?"
        type: choice
        options:
          - both
          - instagram
          - youtube
          - commenttest
        default: both

permissions:
  contents: write # gh release (IG video hosting) için gerekli

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Chrome bağımlılıkları (Remotion render için)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 fonts-liberation \
            fonts-noto-color-emoji
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Remotion tarayıcısını hazırla
        run: npx remotion browser ensure

      - name: Google kimlik bilgilerini yaz (base64 secrets'tan)
        run: |
          mkdir -p scripts
          echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > scripts/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_B64 }}" | base64 -d > scripts/token.json
          node -e "JSON.parse(require('fs').readFileSync('scripts/credentials.json','utf8')); JSON.parse(require('fs').readFileSync('scripts/token.json','utf8')); console.log('✓ JSON geçerli')"

      - name: Render + yükle (YouTube zamanlı + Instagram Reels)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SCHED="${{ github.event.schedule }}"
          if [ -n "$MODE" ]; then
            echo "▶ Manuel: $MODE"
            case "$MODE" in
              instagram)   npm run rotation -- --instagram ;;
              youtube)     npm run rotation -- --upload ;;
              commenttest) npx tsx scripts/upload-instagram.ts --comment-test ;;
              *)           npm run rotation -- --upload --instagram ;;
            esac
          else
            echo "▶ Zamanlı: $SCHED"
            case "$SCHED" in
              "41 3 * * *") npm run rotation -- --upload ;;
              "7 10 * * *") npm run rotation -- --instagram --slot morning ;;
              "7 18 * * *") npm run rotation -- --instagram --slot evening ;;
              *)            echo "⚠️ Bilinmeyen schedule ($SCHED) — güvenlik için atlanıyor" ;;
            esac
          fi
